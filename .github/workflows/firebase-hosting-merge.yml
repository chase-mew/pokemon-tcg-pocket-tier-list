name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: yarn
      - run: yarn build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POKEMON_TCG_POCKET_TIER_LIST }}
          FIREBASE_TOOLS_VERSION: 15.22.3
          PROJECT_ID: pokemon-tcg-pocket-tier-list
        run: |
          duplicate_release_pattern="Can't release to .*channels/live.*supplied version .* is the current active version\\."
          credentials_file="$(mktemp)"
          log_file="$(mktemp)"
          trap 'rm -f "$credentials_file" "$log_file"' EXIT

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$credentials_file"
          export GOOGLE_APPLICATION_CREDENTIALS="$credentials_file"

          npx "firebase-tools@$FIREBASE_TOOLS_VERSION" deploy --only hosting --project "$PROJECT_ID" 2>&1 | tee "$log_file"
          pipeline_status=("${PIPESTATUS[@]}")
          deploy_status=${pipeline_status[0]}
          tee_status=${pipeline_status[1]}

          if [ "$tee_status" -ne 0 ]; then
            exit "$tee_status"
          fi

          if [ "$deploy_status" -ne 0 ]; then
            if grep -Eq "$duplicate_release_pattern" "$log_file"; then
              echo "Hosting version is already live; treating deploy as successful."
              exit 0
            fi

            exit "$deploy_status"
          fi
