name: Analysis Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "analysis/yarn.lock"

      - name: Install dependencies
        run: |
          cd analysis
          yarn install

      - name: Run tests
        run: |
          cd analysis
          yarn test
